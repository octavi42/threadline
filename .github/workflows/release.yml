name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        working-directory: overlay
        run: swift build -c release --arch ${{ matrix.arch }}

      - name: Package
        run: |
          mkdir -p dist
          cp overlay/.build/release/threadline-overlay dist/
          tar -czf "threadline-overlay-macos-${{ matrix.arch }}.tar.gz" -C dist threadline-overlay
          shasum -a 256 "threadline-overlay-macos-${{ matrix.arch }}.tar.gz" \
            > "threadline-overlay-macos-${{ matrix.arch }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            threadline-overlay-macos-${{ matrix.arch }}.tar.gz
            threadline-overlay-macos-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            threadline-overlay-macos-arm64.tar.gz
            threadline-overlay-macos-arm64.sha256
            threadline-overlay-macos-x86_64.tar.gz
            threadline-overlay-macos-x86_64.sha256
